<!DOCTYPE html>
<html>
<head>
    <title>Paddy Purchasing System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 20px;
        }

        .container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            text-align: center;
            color: green;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Paddy Purchasing System</h1>

    <form>
        <label>Farmer Name</label>
        <input type="text" placeholder="Enter Farmer Name">

        <label>Location</label>
        <input type="text" placeholder="Enter Location">

        <label>Paddy Quantity (Kg)</label>
        <input type="number" placeholder="Enter Quantity">

        <label>Price Per Kg (Rs)</label>
        <input type="number" placeholder="Enter Price">

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
